<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Eurocall — Διαχείριση</title>
<style>
  :root { --blue:#0047ba; --navy:#061b72; --green:#2da884; --ink:#0f1a2e; --line:#e3e8f0; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:#f4f6fb; line-height:1.4; }
  header { background:var(--navy); color:#fff; padding:16px 18px; position:sticky; top:0; z-index:5; }
  header b { font-size:1.05rem; }
  header span { display:block; font-size:.8rem; opacity:.75; margin-top:2px; }
  main { max-width:560px; margin:0 auto; padding:18px 16px 60px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:18px; }
  label { display:block; font-weight:600; font-size:.92rem; margin:14px 0 6px; }
  label:first-child { margin-top:0; }
  input[type=text], textarea, select {
    width:100%; padding:13px 12px; font-size:16px; border:1.5px solid var(--line);
    border-radius:10px; background:#fff; color:var(--ink); }
  textarea { min-height:64px; resize:vertical; }
  .seg { display:flex; gap:8px; }
  .seg button { flex:1; padding:13px; border:1.5px solid var(--line); background:#fff; border-radius:10px;
    font-size:.95rem; font-weight:600; color:#5a6677; cursor:pointer; }
  .seg button.on { border-color:var(--green); background:#eafaf4; color:#1d7a5c; }
  .tabs { display:flex; gap:8px; margin-bottom:18px; }
  .tabs button { flex:1; padding:12px; border:1.5px solid var(--line); background:#fff; border-radius:11px;
    font-weight:700; color:#5a6677; cursor:pointer; }
  .tabs button.on { border-color:var(--blue); color:var(--blue); background:#eef4ff; }
  .photos { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .thumb { position:relative; width:74px; height:74px; border-radius:9px; overflow:hidden; border:1px solid var(--line); }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb b { position:absolute; top:2px; right:2px; background:rgba(0,0,0,.6); color:#fff;
    width:20px; height:20px; border-radius:50%; font-size:13px; line-height:20px; text-align:center; cursor:pointer; }
  .photo-add { display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    padding:16px; border:1.5px dashed #b9c4d6; border-radius:10px; background:#fbfcfe; color:var(--blue);
    font-weight:600; cursor:pointer; margin-top:8px; }
  .btn { display:block; width:100%; padding:15px; border:0; border-radius:11px; font-size:1rem;
    font-weight:700; color:#fff; background:var(--blue); cursor:pointer; margin-top:20px; }
  .btn:disabled { opacity:.55; }
  .msg { padding:12px 14px; border-radius:10px; font-size:.92rem; margin-top:14px; display:none; }
  .msg.ok { background:#eafaf4; color:#1d7a5c; display:block; }
  .msg.err { background:#fdeaea; color:#b3261e; display:block; }
  .hsec { font-size:.78rem; text-transform:uppercase; letter-spacing:.06em; color:#7a8699; margin:6px 0 12px; font-weight:700; }
  .filters { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; }
  .filters button { flex:0 0 auto; padding:8px 12px; border:1.5px solid var(--line); background:#fff;
    border-radius:20px; font-size:.85rem; font-weight:600; color:#5a6677; cursor:pointer; white-space:nowrap; }
  .filters button.on { border-color:var(--blue); color:var(--blue); background:#eef4ff; }
  .item { display:flex; gap:12px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--line); }
  .item:last-child { border-bottom:0; }
  .item img { width:52px; height:52px; border-radius:8px; object-fit:cover; background:#eef1f7; flex:0 0 auto; }
  .item .meta { flex:1; min-width:0; }
  .item .meta b { font-size:.95rem; display:block; }
  .item .meta small { color:#7a8699; }
  .badge { display:inline-block; font-size:.7rem; padding:2px 7px; border-radius:20px; background:#eef1f7; color:#5a6677; margin-left:4px; }
  .badge.used { background:#fff3e0; color:#a85b00; }
  .badge.sold { background:#fdeaea; color:#b3261e; }
  .acts { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  .acts button { padding:8px 10px; border:1.5px solid var(--line); background:#fff; border-radius:9px;
    font-weight:600; font-size:.8rem; cursor:pointer; white-space:nowrap; }
  .acts .del { color:#b3261e; border-color:#f5c2c0; }
  .muted { color:#7a8699; font-size:.9rem; }
  .gate { text-align:center; padding:40px 0; }
  .gate input { max-width:240px; margin:14px auto 0; text-align:center; }
  .edit-banner { background:#eef4ff; border:1px solid #c5d7f5; color:var(--navy); padding:10px 12px;
    border-radius:10px; font-size:.9rem; margin-bottom:12px; display:none; }
  .hint { font-size:.82rem; color:#7a8699; margin-top:4px; }
</style>
</head>
<body>
<header><b>Eurocall · Διαχείριση</b><span>Προϊόντα & κατηγορίες στο site</span></header>
<main>

  <div class="card gate" id="gate">
    <div class="muted">Βάλτε τον κωδικό που σας δώσαμε για να συνεχίσετε.</div>
    <input type="text" id="code" inputmode="text" autocomplete="off" placeholder="Κωδικός" />
    <button class="btn" id="codeBtn">Είσοδος</button>
    <div class="msg" id="gateMsg"></div>
  </div>

  <div id="app" style="display:none">
    <div class="tabs">
      <button type="button" id="tabProducts" class="on">Προϊόντα</button>
      <button type="button" id="tabCategories">Κατηγορίες</button>
    </div>

    <div id="panelProducts">
      <div class="card" id="formCard">
        <div class="edit-banner" id="editBanner">Επεξεργασία προϊόντος — <button type="button" id="cancelEdit" style="border:0;background:none;color:var(--blue);font-weight:700;cursor:pointer;padding:0">Ακύρωση</button></div>
        <label>Κατηγορία</label>
        <select id="category"></select>
        <label>Όνομα προϊόντος</label>
        <input type="text" id="name" placeholder="π.χ. Ψυγείο Θάλαμος Συντήρησης 360L" />
        <label>Χαρακτηριστικά (μία γραμμή)</label>
        <input type="text" id="spec" placeholder="π.χ. Inox · 5 ράφια · Ψηφιακός θερμοστάτης" />
        <label>Κατάσταση</label>
        <div class="seg" id="condition">
          <button type="button" data-v="used">Μεταχειρισμένο</button>
          <button type="button" data-v="new" class="on">Καινούριο</button>
        </div>
        <label>Φωτογραφίες (έως 4)</label>
        <div class="photos" id="thumbs"></div>
        <label class="photo-add" for="photo">📷 Προσθήκη φωτογραφίας</label>
        <input type="file" id="photo" accept="image/*" capture="environment" multiple hidden />
        <label>Σχόλιο (προαιρετικό)</label>
        <textarea id="note" placeholder="π.χ. 1 τεμάχιο, άριστη κατάσταση"></textarea>
        <button class="btn" id="submitBtn">Ανέβασμα στο site</button>
        <div class="msg" id="formMsg"></div>
      </div>
      <div class="card" id="listCard">
        <div class="hsec">Τα προϊόντα μου</div>
        <div class="filters" id="filters"></div>
        <div id="list"><div class="muted">Φόρτωση…</div></div>
      </div>
    </div>

    <div id="panelCategories" style="display:none">
      <div class="card" id="catFormCard">
        <div class="edit-banner" id="catEditBanner">Επεξεργασία κατηγορίας — <button type="button" id="cancelCatEdit" style="border:0;background:none;color:var(--blue);font-weight:700;cursor:pointer;padding:0">Ακύρωση</button></div>
        <label>Όνομα κατηγορίας</label>
        <input type="text" id="catName" placeholder="π.χ. Ψύξη" />
        <label>Κωδικός (για το link)</label>
        <input type="text" id="catSlug" placeholder="π.χ. psyxi" />
        <p class="hint">Μόνο λατινικά, παύλες. Αφήστε κενό για αυτόματο από το όνομα.</p>
        <label>Σύντομη περιγραφή (προαιρετικό)</label>
        <input type="text" id="catTagline" placeholder="π.χ. Θάλαμοι, βιτρίνες & κατάψυξη" />
        <label>Κείμενο σελίδας (προαιρετικό)</label>
        <textarea id="catIntro" placeholder="Μία πρόταση για τη σελίδα κατηγορίας"></textarea>
        <label>Εικόνα κατηγορίας (προαιρετικό)</label>
        <div class="photos" id="catThumb"></div>
        <label class="photo-add" for="catPhoto">📷 Προσθήκη εικόνας</label>
        <input type="file" id="catPhoto" accept="image/*" capture="environment" hidden />
        <button class="btn" id="catSubmitBtn">Αποθήκευση κατηγορίας</button>
        <div class="msg" id="catFormMsg"></div>
      </div>
      <div class="card">
        <div class="hsec">Οι κατηγορίες μου</div>
        <div id="catList"><div class="muted">Φόρτωση…</div></div>
      </div>
    </div>
  </div>

</main>
<script>
const FN = 'https://buwmhccjxuimhnscsujm.supabase.co/functions/v1/catalog';
const CLIENT_ID = 'd011289f-1382-4229-b3a5-74f8c602f77d';
const $ = (id) => document.getElementById(id);
let code = localStorage.getItem('eurocall_admin_code') || '';
let condition = 'new';
let photos = [];
let editingId = null;
let allItems = [];
let allCategories = [];
let filterCat = 'all';
let editingCatId = null;
let catHero = '';

async function call(action, extra) {
  const r = await fetch(FN, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action, client_id: CLIENT_ID, code, ...extra }) });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || 'σφάλμα');
  return j;
}

function slugify(s) {
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,48);
}

function shrink(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const max = 1600;
      let { width:w, height:h } = img;
      if (w > max || h > max) { const s = Math.min(max/w, max/h); w = Math.round(w*s); h = Math.round(h*s); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}

function catMap() { return allCategories.map((c) => [c.slug, c.name]); }

function fillCategorySelect() {
  $('category').innerHTML = allCategories.map((c) =>
    `<option value="${c.slug}">${c.name}</option>`).join('');
}

function renderThumbs() {
  $('thumbs').innerHTML = photos.map((src, i) =>
    `<div class="thumb"><img src="${src}"/><b data-i="${i}">×</b></div>`).join('');
  $('thumbs').querySelectorAll('b').forEach((b) =>
    b.onclick = () => { photos.splice(+b.dataset.i, 1); renderThumbs(); });
}

function renderCatThumb() {
  $('catThumb').innerHTML = catHero
    ? `<div class="thumb"><img src="${catHero}"/><b id="rmCatHero">×</b></div>` : '';
  const rm = $('rmCatHero');
  if (rm) rm.onclick = () => { catHero = ''; renderCatThumb(); };
}

function resetForm() {
  editingId = null;
  $('editBanner').style.display = 'none';
  $('name').value = ''; $('spec').value = ''; $('note').value = '';
  photos = []; renderThumbs();
  condition = 'new';
  document.querySelectorAll('#condition button').forEach((x) =>
    x.classList.toggle('on', x.dataset.v === 'new'));
  $('submitBtn').textContent = 'Ανέβασμα στο site';
}

function resetCatForm() {
  editingCatId = null;
  $('catEditBanner').style.display = 'none';
  $('catName').value = ''; $('catSlug').value = '';
  $('catTagline').value = ''; $('catIntro').value = '';
  catHero = ''; renderCatThumb();
  $('catSubmitBtn').textContent = 'Αποθήκευση κατηγορίας';
}

function startEdit(it) {
  editingId = it.id;
  $('editBanner').style.display = 'block';
  $('category').value = it.category_slug;
  $('name').value = it.name;
  $('spec').value = it.spec || '';
  $('note').value = it.note || '';
  condition = it.condition === 'used' ? 'used' : 'new';
  document.querySelectorAll('#condition button').forEach((x) =>
    x.classList.toggle('on', x.dataset.v === condition));
  photos = (it.images || []).slice(0, 4);
  renderThumbs();
  $('submitBtn').textContent = 'Αποθήκευση αλλαγών';
  $('panelProducts').scrollIntoView({ behavior: 'smooth' });
}

function startCatEdit(c) {
  editingCatId = c.id;
  $('catEditBanner').style.display = 'block';
  $('catName').value = c.name;
  $('catSlug').value = c.slug;
  $('catTagline').value = c.tagline || '';
  $('catIntro').value = c.intro || '';
  catHero = c.hero || '';
  renderCatThumb();
  $('catSubmitBtn').textContent = 'Αποθήκευση αλλαγών';
  $('catFormCard').scrollIntoView({ behavior: 'smooth' });
}

async function loadCategories() {
  const { categories } = await call('list_categories', {});
  allCategories = categories || [];
  fillCategorySelect();
  renderFilters();
  renderCatList();
}

function renderFilters() {
  const CATS = catMap();
  $('filters').innerHTML =
    `<button type="button" data-cat="all" class="${filterCat==='all'?'on':''}">Όλα</button>` +
    CATS.map(([s,n]) => `<button type="button" data-cat="${s}" class="${filterCat===s?'on':''}">${n}</button>`).join('');
  $('filters').querySelectorAll('button').forEach((b) => b.onclick = () => {
    filterCat = b.dataset.cat; renderFilters(); renderList();
  });
}

function renderList() {
  const CATS = catMap();
  const items = filterCat === 'all' ? allItems : allItems.filter((it) => it.category_slug === filterCat);
  if (!items.length) {
    $('list').innerHTML = '<div class="muted">Δεν υπάρχουν προϊόντα σε αυτή την κατηγορία.</div>';
    return;
  }
  $('list').innerHTML = items.map((it) => {
    const sold = it.status === 'sold';
    const cn = CATS.find(([s]) => s === it.category_slug);
    const cat = cn ? cn[1] : it.category_slug;
    return `<div class="item">
      <img src="${(it.images&&it.images[0])||''}" alt=""/>
      <div class="meta"><b>${it.name}</b><small>${cat}</small>
        <span class="badge ${it.condition}">${it.condition==='used'?'Μεταχ/νο':'Καινούριο'}</span>
        ${sold?'<span class="badge sold">Πουλήθηκε</span>':''}</div>
      <div class="acts">
        <button type="button" data-edit="${it.id}">Επεξεργασία</button>
        <button type="button" data-sold="${it.id}" data-status="${it.status}">${sold?'↩ Επαναφορά':'Πουλήθηκε'}</button>
        <button type="button" class="del" data-del="${it.id}">Διαγραφή</button>
      </div></div>`;
  }).join('');
  $('list').querySelectorAll('[data-edit]').forEach((b) => b.onclick = () => {
    const it = allItems.find((x) => x.id === b.dataset.edit);
    if (it) startEdit(it);
  });
  $('list').querySelectorAll('[data-sold]').forEach((b) => b.onclick = async () => {
    const next = b.dataset.status === 'sold' ? 'available' : 'sold';
    b.disabled = true;
    try { await call('set_status', { id: b.dataset.sold, status: next }); await loadList(); }
    catch { b.disabled = false; alert('Κάτι πήγε στραβά.'); }
  });
  $('list').querySelectorAll('[data-del]').forEach((b) => b.onclick = async () => {
    if (!confirm('Οριστική διαγραφή προϊόντος;')) return;
    b.disabled = true;
    try { await call('delete', { id: b.dataset.del }); await loadList(); if (editingId === b.dataset.del) resetForm(); }
    catch { b.disabled = false; alert('Κάτι πήγε στραβά.'); }
  });
}

function renderCatList() {
  if (!allCategories.length) {
    $('catList').innerHTML = '<div class="muted">Δεν υπάρχουν κατηγορίες. Προσθέστε την πρώτη παραπάνω.</div>';
    return;
  }
  $('catList').innerHTML = allCategories.map((c) =>
    `<div class="item">
      <img src="${c.hero||''}" alt=""/>
      <div class="meta"><b>${c.name}</b><small>${c.slug}</small></div>
      <div class="acts">
        <button type="button" data-cedit="${c.id}">Επεξεργασία</button>
        <button type="button" class="del" data-cdel="${c.id}">Διαγραφή</button>
      </div></div>`).join('');
  $('catList').querySelectorAll('[data-cedit]').forEach((b) => b.onclick = () => {
    const c = allCategories.find((x) => x.id === b.dataset.cedit);
    if (c) startCatEdit(c);
  });
  $('catList').querySelectorAll('[data-cdel]').forEach((b) => b.onclick = async () => {
    if (!confirm('Διαγραφή κατηγορίας; Θα φύγει από το site (μόνο αν δεν έχει προϊόντα).')) return;
    b.disabled = true;
    try {
      await call('delete_category', { id: b.dataset.cdel });
      await loadCategories();
      if (editingCatId === b.dataset.cdel) resetCatForm();
    } catch (e) { alert(e.message); b.disabled = false; }
  });
}

async function loadList() {
  try {
    const { items } = await call('list', {});
    allItems = items || [];
    renderList();
  } catch {
    $('list').innerHTML = '<div class="muted">Δεν φορτώθηκαν τα προϊόντα.</div>';
  }
}

async function unlock() {
  try {
    await call('list', {});
    localStorage.setItem('eurocall_admin_code', code);
    $('gate').style.display = 'none';
    $('app').style.display = '';
    await loadCategories();
    await loadList();
  } catch {
    code = '';
    $('gateMsg').className = 'msg err';
    $('gateMsg').textContent = 'Λάθος κωδικός. Δοκιμάστε ξανά.';
  }
}

$('tabProducts').onclick = () => {
  $('tabProducts').classList.add('on'); $('tabCategories').classList.remove('on');
  $('panelProducts').style.display = ''; $('panelCategories').style.display = 'none';
};
$('tabCategories').onclick = () => {
  $('tabCategories').classList.add('on'); $('tabProducts').classList.remove('on');
  $('panelCategories').style.display = ''; $('panelProducts').style.display = 'none';
};

$('codeBtn').onclick = () => { code = $('code').value.trim(); if (code) unlock(); };
$('code').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('codeBtn').click(); });
$('cancelEdit').onclick = resetForm;
$('cancelCatEdit').onclick = resetCatForm;

$('catName').addEventListener('input', () => {
  if (!editingCatId && !$('catSlug').value.trim())
    $('catSlug').placeholder = slugify($('catName').value) || 'π.χ. psyxi';
});

document.querySelectorAll('#condition button').forEach((b) => b.onclick = () => {
  condition = b.dataset.v;
  document.querySelectorAll('#condition button').forEach((x) => x.classList.toggle('on', x === b));
});

$('photo').addEventListener('change', async (e) => {
  for (const f of [...e.target.files]) {
    if (photos.length >= 4) break;
    try { photos.push(await shrink(f)); } catch {}
  }
  e.target.value = ''; renderThumbs();
});

$('catPhoto').addEventListener('change', async (e) => {
  const f = e.target.files[0];
  if (f) try { catHero = await shrink(f); renderCatThumb(); } catch {}
  e.target.value = '';
});

$('submitBtn').onclick = async () => {
  const name = $('name').value.trim();
  const category_slug = $('category').value;
  if (!name) { showMsg('formMsg','err','Συμπληρώστε όνομα.'); return; }
  if (!photos.length && !editingId) { showMsg('formMsg','err','Προσθέστε φωτογραφία.'); return; }
  $('submitBtn').disabled = true;
  try {
    const payload = { category_slug, name, spec: $('spec').value.trim(), condition, note: $('note').value.trim() };
    const newPhotos = photos.filter((p) => p.startsWith('data:'));
    if (newPhotos.length) payload.images = newPhotos;
    else if (photos.length) payload.image_urls = photos;
    if (editingId) await call('update', { id: editingId, ...payload });
    else await call('submit', payload);
    showMsg('formMsg','ok', editingId ? '✓ Αποθηκεύτηκε!' : '✓ Ανέβηκε!');
    resetForm(); await loadList();
  } catch (e) { showMsg('formMsg','err', e.message); }
  $('submitBtn').disabled = false;
};

$('catSubmitBtn').onclick = async () => {
  const name = $('catName').value.trim();
  const slug = $('catSlug').value.trim() || slugify(name);
  if (!name) { showMsg('catFormMsg','err','Συμπληρώστε όνομα κατηγορίας.'); return; }
  $('catSubmitBtn').disabled = true;
  try {
    const payload = {
      name, slug,
      tagline: $('catTagline').value.trim(),
      intro: $('catIntro').value.trim(),
    };
    const newHero = catHero && catHero.startsWith('data:') ? catHero : null;
    if (newHero) payload.images = [newHero];
    else if (catHero) payload.hero_url = catHero;
    if (editingCatId) await call('update_category', { id: editingCatId, ...payload });
    else await call('create_category', payload);
    showMsg('catFormMsg','ok', editingCatId ? '✓ Αποθηκεύτηκε!' : '✓ Η κατηγορία προστέθηκε!');
    resetCatForm(); await loadCategories();
  } catch (e) { showMsg('catFormMsg','err', e.message); }
  $('catSubmitBtn').disabled = false;
};

function showMsg(id, kind, text) {
  const m = $(id); m.className = 'msg ' + kind; m.textContent = text;
  if (kind === 'ok') setTimeout(() => { m.className = 'msg'; }, 5000);
}

if (code) unlock();
</script>
</body>
</html>
